{% if error %}
<div class="border border-edge-strong bg-surface px-5 py-4 text-xs uppercase tracking-[0.14em] text-danger">
  {{ error }}
</div>
{% else %}
<div class="border border-edge-strong bg-background px-5 py-4 text-xs text-foreground">
  <p class="uppercase tracking-[0.14em] text-accent">Товар добавлен</p>
  <p class="mt-2 font-serif text-base normal-case text-heading">{{ product_name }}</p>
  <p class="mt-2 text-muted">Товаров в корзине: {{ item_count }}</p>
  <a href="{% url 'products:cart' %}" class="btn-luxury mt-4 inline-flex px-4 py-2 text-[10px]">В корзину</a>
</div>
{% include "core/partials/nav_cart_badge.html" with count=item_count hx_oob=True only %}
{% endif %}
