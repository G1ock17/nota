<div class="border-t border-edge pt-4 first:border-t-0 first:pt-0">
  <h3 class="mb-3 text-[10px] uppercase tracking-[0.22em] text-accent">{{ section_title }}</h3>
  <div class="space-y-2">
    {% for note in notes %}
      <label class="flex cursor-pointer items-center gap-2 text-sm text-foreground">
        <input
          type="checkbox"
          name="notes"
          value="{{ note.slug }}"
          class="h-4 w-4 border border-edge-strong bg-transparent text-accent accent-accent focus:outline-none focus:ring-0 focus:ring-offset-0"
          {% if note.slug in selected_notes %}checked{% endif %}
        >
        <span>{{ note.name }}</span>
      </label>
    {% empty %}
      <p class="text-sm text-muted">—</p>
    {% endfor %}
  </div>
</div>
