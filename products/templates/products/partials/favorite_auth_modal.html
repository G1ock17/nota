<div
  id="favorite-auth-modal"
  class="favorite-auth-modal filter-modal"
  aria-hidden="true"
  data-post-auth-path="{% url 'products:favorite_post_auth' %}"
  data-login-path="{% url 'login' %}"
  data-register-path="{% url 'register' %}"
>
  <div class="filter-modal__backdrop" data-favorite-auth-modal-close tabindex="-1" aria-hidden="true"></div>
  <div class="filter-modal__panel favorite-auth-modal__panel" role="dialog" aria-modal="true" aria-labelledby="favorite-auth-modal-title">
    <div class="flex items-start justify-between gap-4 border-b border-[#C9A96E]/25 pb-4">
      <h2 id="favorite-auth-modal-title" class="font-serif text-2xl text-[#F5F1E8]">Избранное</h2>
      <button type="button" class="text-2xl leading-none text-[#BDB6AA] transition-colors hover:text-[#E4DFD5]" data-favorite-auth-modal-close aria-label="Закрыть">
        <span aria-hidden="true">&times;</span>
      </button>
    </div>
    <p class="mt-5 text-sm leading-relaxed text-[#BDB6AA]">
      Войдите или зарегистрируйтесь — товар будет добавлен в избранное, и вы вернётесь на эту страницу.
    </p>
    <div class="mt-8 flex flex-col gap-3 sm:flex-row sm:items-stretch">
      <a
        id="favorite-auth-modal-login"
        href="#"
        class="btn-luxury flex-1 text-center"
      >Войти</a>
      <a
        id="favorite-auth-modal-register"
        href="#"
        class="flex-1 border border-[#C9A96E]/45 py-3 text-center text-[10px] uppercase tracking-[0.16em] text-[#C9A96E] transition-colors hover:border-[#C9A96E] hover:bg-[#C9A96E]/10"
      >Регистрация</a>
    </div>
  </div>
</div>
