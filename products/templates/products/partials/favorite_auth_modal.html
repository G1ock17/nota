<div
  id="favorite-auth-modal"
  class="favorite-auth-modal filter-modal"
  aria-hidden="true"
  data-post-auth-path="{% url 'products:favorite_post_auth' %}"
  data-login-path="{% url 'login' %}"
  data-register-path="{% url 'register' %}"
>
  <div class="filter-modal__backdrop" data-favorite-auth-modal-close tabindex="-1" aria-hidden="true"></div>
  <div class="filter-modal__panel favorite-auth-modal__panel" role="dialog" aria-modal="true" aria-labelledby="favorite-auth-modal-title">
    <div class="flex items-start justify-between gap-4 border-b border-edge pb-4">
      <h2 id="favorite-auth-modal-title" class="font-serif text-2xl text-heading">Избранное</h2>
      <button type="button" class="text-2xl leading-none text-muted transition-colors hover:text-foreground" data-favorite-auth-modal-close aria-label="Закрыть">
        <span aria-hidden="true">&times;</span>
      </button>
    </div>
    <p class="mt-5 text-sm leading-relaxed text-muted">
      Войдите или зарегистрируйтесь — товар будет добавлен в избранное, и вы вернётесь на эту страницу.
    </p>
    <div class="favorite-auth-modal__actions mt-8 grid grid-cols-2 gap-3">
      <a
        id="favorite-auth-modal-login"
        href="#"
        class="btn-luxury w-full min-w-0 justify-center text-center"
      >Войти</a>
      <a
        id="favorite-auth-modal-register"
        href="#"
        class="favorite-auth-modal__register flex w-full min-w-0 items-center justify-center py-3 text-center text-accent no-underline"
      >Регистрация</a>
    </div>
  </div>
</div>
