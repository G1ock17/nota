<div class="catalog-sort-bar mb-6 space-y-3">
  <div class="catalog-sort-bar__filters flex w-full min-w-0 flex-nowrap items-center gap-3 overflow-x-auto pb-0.5 md:gap-4">
    <button type="button" class="btn-luxury text-[10px]" data-filter-modal-open="brands">
      Бренды{% if selected_brands %} ({{ selected_brands|length }}){% endif %}
    </button>
    <button type="button" class="btn-luxury text-[10px]" data-filter-modal-open="notes">
      Ноты{% if selected_notes %} ({{ selected_notes|length }}){% endif %}
    </button>
    <button type="button" class="btn-luxury text-[10px]" data-filter-modal-open="years">
      Год{% if selected_years %} ({{ selected_years|length }}){% endif %}
    </button>
    <button type="button" class="btn-luxury text-[10px]" data-filter-modal-open="countries">
      Страна{% if selected_countries %} ({{ selected_countries|length }}){% endif %}
    </button>
  </div>
  <div class="catalog-sort-bar__sort-group flex min-w-0 flex-wrap items-center gap-2 md:justify-end md:gap-3">
    <label for="id_sort" class="shrink-0 whitespace-nowrap text-[10px] uppercase text-[#C9A96E]">Сортировка</label>
    <select
      name="sort"
      id="id_sort"
      class="catalog-sort-bar__select shrink-0 border border-[#C9A96E]/45 bg-[#0B0B0B] text-[#E4DFD5] focus:border-[#C9A96E] focus:outline-none"
      onchange="this.form.requestSubmit()"
    >
      <option value="newest" {% if current_sort == "newest" %}selected{% endif %}>Сначала новые</option>
      <option value="popularity" {% if current_sort == "popularity" %}selected{% endif %}>По популярности</option>
      <option value="price_asc" {% if current_sort == "price_asc" %}selected{% endif %}>Цена: по возрастанию</option>
      <option value="price_desc" {% if current_sort == "price_desc" %}selected{% endif %}>Цена: по убыванию</option>
      <option value="name" {% if current_sort == "name" %}selected{% endif %}>По названию</option>
    </select>
  </div>
</div>
