{% if user.is_authenticated %}
<button
  type="button"
  class="favorite-btn favorite-btn--catalog {% if product.pk in favorite_product_ids %}is-active{% endif %}"
  hx-post="{% url 'products:favorite_toggle' %}"
  hx-include="#htmx-csrf"
  hx-vals='{"product_id": "{{ product.id }}", "button": "catalog"}'
  hx-target="this"
  hx-swap="outerHTML"
  hx-push-url="false"
  aria-pressed="{% if product.pk in favorite_product_ids %}true{% else %}false{% endif %}"
  aria-label="{% if product.pk in favorite_product_ids %}Убрать из избранного{% else %}Добавить в избранное{% endif %}"
>
  <svg class="favorite-btn__heart favorite-btn__heart--sm" viewBox="0 0 24 24" aria-hidden="true" width="18" height="18">
    {% if product.pk in favorite_product_ids %}
    <path fill="currentColor" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round" d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/>
    {% else %}
    <path fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/>
    {% endif %}
  </svg>
</button>
{% else %}
<button
  type="button"
  class="favorite-btn favorite-btn--catalog"
  data-favorite-auth-modal-open
  data-product-id="{{ product.id }}"
  aria-label="Добавить в избранное — требуется вход"
>
  <svg class="favorite-btn__heart favorite-btn__heart--sm" viewBox="0 0 24 24" aria-hidden="true" width="18" height="18">
    <path fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/>
  </svg>
</button>
{% endif %}
