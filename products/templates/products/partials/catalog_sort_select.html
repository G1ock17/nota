<details class="catalog-sort-dropdown {{ sort_select_extra_class }}">
  <summary id="{{ sort_select_id }}" class="catalog-sort-dropdown__summary">
    {% if current_sort == "popularity" %}
      По популярности
    {% elif current_sort == "price_asc" %}
      Цена: по возрастанию
    {% elif current_sort == "price_desc" %}
      Цена: по убыванию
    {% elif current_sort == "name" %}
      По названию
    {% else %}
      Сначала новые
    {% endif %}
  </summary>
  <div class="catalog-sort-dropdown__menu" role="listbox" aria-labelledby="{{ sort_select_id }}">
    <button type="submit" name="sort" value="newest" class="catalog-sort-dropdown__option {% if current_sort == 'newest' %}is-active{% endif %}">
      Сначала новые
    </button>
    <button type="submit" name="sort" value="popularity" class="catalog-sort-dropdown__option {% if current_sort == 'popularity' %}is-active{% endif %}">
      По популярности
    </button>
    <button type="submit" name="sort" value="price_asc" class="catalog-sort-dropdown__option {% if current_sort == 'price_asc' %}is-active{% endif %}">
      Цена: по возрастанию
    </button>
    <button type="submit" name="sort" value="price_desc" class="catalog-sort-dropdown__option {% if current_sort == 'price_desc' %}is-active{% endif %}">
      Цена: по убыванию
    </button>
    <button type="submit" name="sort" value="name" class="catalog-sort-dropdown__option {% if current_sort == 'name' %}is-active{% endif %}">
      По названию
    </button>
  </div>
</details>
