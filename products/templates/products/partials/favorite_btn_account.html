<button
  type="button"
  class="favorite-btn favorite-btn--catalog is-active"
  hx-post="{% url 'products:favorite_toggle' %}"
  hx-include="#htmx-csrf"
  hx-vals='{"product_id": "{{ product.id }}", "button": "catalog", "context": "account"}'
  hx-target="closest article"
  hx-swap="delete"
  hx-push-url="false"
  aria-label="Убрать из избранного"
>
  <svg class="favorite-btn__heart favorite-btn__heart--sm" viewBox="0 0 24 24" aria-hidden="true" width="18" height="18">
    <path fill="currentColor" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round" d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/>
  </svg>
</button>
