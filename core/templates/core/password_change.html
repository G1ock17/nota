{% extends "core/base.html" %}
{% load static %}

{% block title %}Смена пароля — nota{% endblock %}

{% block body %}
<div class="min-h-screen bg-background text-foreground">
  {% include "core/partials/navbar.html" %}
  <main class="mx-auto w-full max-w-md px-6 py-16 lg:px-12">
    <h1 class="font-serif text-4xl text-heading">Смена пароля</h1>
    <form method="post" class="mt-8 space-y-5">
      {% csrf_token %}
      {% for field in form %}
        <div>
          <label for="{{ field.id_for_label }}" class="mb-2 block text-[10px] uppercase tracking-[0.2em] text-accent">{{ field.label }}</label>
          <input
            type="password"
            name="{{ field.html_name }}"
            id="{{ field.id_for_label }}"
            required
            class="w-full border border-edge-strong bg-background px-3 py-2 text-sm text-foreground focus:border-accent focus:outline-none"
          >
          {% if field.errors %}
            <p class="mt-2 text-xs text-danger">{{ field.errors.0 }}</p>
          {% endif %}
        </div>
      {% endfor %}
      <button type="submit" class="btn-luxury w-full">Обновить пароль</button>
    </form>
  </main>
</div>
{% endblock %}
