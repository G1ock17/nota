<article class="product-card reveal group flex h-full flex-col">
    <div class="product-card__media">
        <img src="{{ image }}" alt="{{ name }}" class="relative z-0 h-full w-full object-cover transition duration-500 group-hover:scale-105">
    </div>
    <div class="product-info">
        <p class="product-brand">{{ family }}</p>
        <h3 class="product-title">{{ name }}</h3>
        <div class="divider" aria-hidden="true"></div>
        <div class="price-row">
            <span class="product-price">{{ price }}</span>
            <span class="product-volume">{{ volume }}</span>
        </div>
    </div>
</article>
