<article class="reveal group border border-[#C9A96E]/35 p-6 transition duration-500 ease-out hover:scale-[1.03]">
    <div class="mb-6 aspect-[4/5] overflow-hidden border border-[#C9A96E]/30">
        <img src="{{ image }}" alt="{{ name }}" class="h-full w-full object-cover transition duration-500 group-hover:scale-105">
    </div>
    <p class="mb-3 text-[10px] uppercase tracking-[0.22em] text-[#C9A96E]">{{ family }}</p>
    <h3 class="mb-3 font-serif text-2xl text-[#F3EFE7]">{{ name }}</h3>
    <p class="mb-6 text-sm leading-7 text-[#BDB6AA]">{{ description }}</p>
    <div class="flex items-center justify-between">
        <span class="text-xs uppercase tracking-[0.2em] text-[#C9A96E]">{{ volume }}</span>
        <span class="font-serif text-xl text-[#F3EFE7]">{{ price }}</span>
    </div>
</article>
