<svg xmlns="http://www.w3.org/2000/svg" width="800" height="1000" viewBox="0 0 800 1000" role="img" aria-label="Цитрусовый аромат">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#14120f"/>
      <stop offset="100%" style="stop-color:#0b0a08"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="35%" r="55%">
      <stop offset="0%" style="stop-color:#c9a96e;stop-opacity:0.22"/>
      <stop offset="100%" style="stop-color:#c9a96e;stop-opacity:0"/>
    </radialGradient>
    <linearGradient id="lemon" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f0e68c"/>
      <stop offset="50%" style="stop-color:#e8d44a"/>
      <stop offset="100%" style="stop-color:#c9a227"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1.2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="800" height="1000" fill="url(#bg)"/>
  <ellipse cx="400" cy="320" rx="380" ry="280" fill="url(#glow)"/>
  <!-- Lemon slice -->
  <g transform="translate(400 380)" filter="url(#soft)">
    <circle r="200" fill="url(#lemon)" stroke="#c9a96e" stroke-width="3" opacity="0.95"/>
    <circle r="178" fill="none" stroke="#f5f1e8" stroke-opacity="0.15" stroke-width="2"/>
    <!-- Segments -->
    <g stroke="#b8a030" stroke-width="2" stroke-opacity="0.5" fill="none">
      <line x1="0" y1="0" x2="0" y2="-178"/>
      <line x1="0" y1="0" x2="85" y2="-155"/>
      <line x1="0" y1="0" x2="155" y2="-85"/>
      <line x1="0" y1="0" x2="178" y2="0"/>
      <line x1="0" y1="0" x2="155" y2="85"/>
      <line x1="0" y1="0" x2="85" y2="155"/>
      <line x1="0" y1="0" x2="0" y2="178"/>
      <line x1="0" y1="0" x2="-85" y2="155"/>
      <line x1="0" y1="0" x2="-155" y2="85"/>
      <line x1="0" y1="0" x2="-178" y2="0"/>
      <line x1="0" y1="0" x2="-155" y2="-85"/>
      <line x1="0" y1="0" x2="-85" y2="-155"/>
    </g>
    <circle r="28" fill="#fdf8e8" opacity="0.9"/>
  </g>
  <!-- Bergamot hint -->
  <ellipse cx="520" cy="620" rx="95" ry="72" fill="#2a2418" stroke="#c9a96e" stroke-opacity="0.35" stroke-width="2" transform="rotate(-18 520 620)"/>
  <ellipse cx="520" cy="620" rx="78" ry="58" fill="#1a1610" transform="rotate(-18 520 620)"/>
</svg>
